<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<audio id="a" loop>
  <source src="https://drive.google.com/uc?export=download&id=1EIWbCYKrgU0Sb0s6YZlR5hw5oAqvSzzk" type="audio/mpeg">
</audio>
<script>
  var a = document.getElementById('a');
  a.volume = 0.6;
  window.addEventListener('message', function(e) {
    if (e.data === 'play') a.play();
    if (e.data === 'stop') { a.pause(); a.currentTime = 0; }
    if (e.data === 'fade') {
      var t = setInterval(function() {
        if (a.volume > 0.05) { a.volume -= 0.05; }
        else { a.pause(); clearInterval(t); }
      }, 40);
    }
    if (typeof e.data === 'number') a.volume = e.data;
  });
</script>
</body>
</html>
